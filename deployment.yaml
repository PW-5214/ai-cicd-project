apiVersion: apps/v1
kind: Deployment
metadata:
 name: ai-model

spec:
 replicas: 2

 selector:
   matchLabels:
     app: ai-model

 template:
   metadata:
     labels:
       app: ai-model

   spec:
     containers:
     - name: ai-model
       image: dockerhub-username/ai-model:latest
       ports:
       - containerPort: 5000
